<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码支付演示</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --border: #1f2937;
    --accent: #00d4aa;
    --accent2: #7c3aed;
    --text: #e2e8f0;
    --muted: #64748b;
    --success: #10b981;
    --warning: #f59e0b;
    --error: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 30%, rgba(0,212,170,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 70%, rgba(124,58,237,0.08) 0%, transparent 60%);
    pointer-events: none;
    animation: bgPulse 8s ease-in-out infinite alternate;
  }
  @keyframes bgPulse { from { opacity: 0.6; } to { opacity: 1; } }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .page { display: none; width: 100%; max-width: 480px; padding: 20px; position: relative; z-index: 1; }
  .page.active { display: block; animation: fadeSlideIn 0.5s cubic-bezier(0.16,1,0.3,1); }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  .logo-tag {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    background: rgba(0,212,170,0.12); color: var(--accent);
    border: 1px solid rgba(0,212,170,0.25); border-radius: 4px;
    padding: 2px 6px; margin-left: auto;
  }

  h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

  .plans { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  .plan {
    border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 10px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative;
  }
  .plan:hover { border-color: rgba(0,212,170,0.4); }
  .plan.selected { border-color: var(--accent); background: rgba(0,212,170,0.06); }
  .plan .badge {
    position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
    font-size: 10px; font-weight: 600;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: #fff; border-radius: 20px; padding: 2px 8px; white-space: nowrap;
  }
  .plan-name { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .plan-price { font-size: 20px; font-weight: 700; color: var(--text); }
  .plan-unit { font-size: 11px; color: var(--muted); }

  .section-label { font-size: 12px; color: var(--muted); margin-bottom: 10px; letter-spacing: 0.5px; text-transform: uppercase; }
  .pay-methods { display: flex; gap: 10px; margin-bottom: 24px; }
  .pay-btn {
    flex: 1; border: 1px solid var(--border); border-radius: 10px; padding: 12px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    cursor: pointer; background: transparent; color: var(--text); font-size: 14px; font-family: inherit; transition: all 0.2s;
  }
  .pay-btn:hover { border-color: rgba(0,212,170,0.4); }
  .pay-btn.selected { border-color: var(--accent); background: rgba(0,212,170,0.06); }
  .pay-btn .icon { font-size: 20px; }

  .order-summary {
    background: rgba(255,255,255,0.02); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 20px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .order-info { font-size: 13px; color: var(--muted); }
  .order-amount { font-size: 24px; font-weight: 700; }
  .order-amount span { font-size: 14px; color: var(--accent); }

  .btn-pay {
    width: 100%; background: linear-gradient(135deg, var(--accent), #00b890);
    color: #0a0e1a; font-weight: 700; font-size: 16px; font-family: inherit;
    border: none; border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px;
  }
  .btn-pay:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,212,170,0.3); }
  .btn-pay:active { transform: translateY(0); }

  .qr-header { text-align: center; margin-bottom: 24px; }
  .qr-header h2 { font-size: 20px; margin-bottom: 6px; }

  .qr-wrap {
    display: flex; flex-direction: column; align-items: center;
    background: rgba(255,255,255,0.02); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px 20px; margin-bottom: 20px; position: relative;
  }

  .qr-code {
    width: 180px; height: 180px; background: #fff; border-radius: 10px;
    padding: 10px; position: relative; margin-bottom: 16px;
  }
  .qr-inner {
    width: 100%; height: 100%;
    background:
      linear-gradient(#000 0 0) 0 0/40px 40px,
      linear-gradient(#000 0 0) calc(100% - 0px) 0/40px 40px,
      linear-gradient(#000 0 0) 0 calc(100% - 0px)/40px 40px,
      linear-gradient(#000 0 0) 6px 6px/28px 28px,
      linear-gradient(#000 0 0) calc(100% - 6px) 6px/28px 28px,
      linear-gradient(#000 0 0) 6px calc(100% - 6px)/28px 28px,
      linear-gradient(#fff 0 0) 10px 10px/20px 20px,
      linear-gradient(#fff 0 0) calc(100% - 10px) 10px/20px 20px,
      linear-gradient(#fff 0 0) 10px calc(100% - 10px)/20px 20px,
      repeating-linear-gradient(0deg, transparent, transparent 10px, rgba(0,0,0,0.15) 10px, rgba(0,0,0,0.15) 11px),
      repeating-linear-gradient(90deg, transparent, transparent 10px, rgba(0,0,0,0.15) 10px, rgba(0,0,0,0.15) 11px);
    background-repeat: no-repeat, no-repeat, no-repeat, no-repeat, no-repeat, no-repeat, no-repeat, no-repeat, no-repeat, repeat, repeat;
    position: relative;
  }
  .qr-inner::after {
    content: '';
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 20px; height: 20px; background: #000; border-radius: 50%;
    box-shadow: 0 0 0 4px #fff, 0 0 0 6px #000;
  }

  .scan-line {
    position: absolute; top: 10px; left: 10px; right: 10px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanMove 2s ease-in-out infinite; pointer-events: none;
  }
  @keyframes scanMove {
    0% { top: 10px; opacity: 0; } 10% { opacity: 1; }
    90% { opacity: 1; } 100% { top: calc(100% - 12px); opacity: 0; }
  }

  .pay-logo { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; }

  .status-bar {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.02); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; margin-bottom: 20px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--warning);
    animation: dotPulse 1.2s ease-in-out infinite; flex-shrink: 0;
  }
  @keyframes dotPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }
  .status-text { font-size: 13px; color: var(--muted); }
  .status-timer { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent); margin-left: auto; }

  .poll-info { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 16px; }
  .progress-bar { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 20px; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px; transition: width 0.4s ease; width: 0%;
  }

  .demo-controls { display: flex; gap: 10px; }
  .btn-sim {
    flex: 1; border: 1px solid var(--border); background: transparent; color: var(--text);
    font-family: inherit; font-size: 13px; border-radius: 8px; padding: 10px; cursor: pointer; transition: all 0.2s;
  }
  .btn-sim:hover { border-color: rgba(0,212,170,0.5); background: rgba(0,212,170,0.05); }
  .btn-sim.primary { border-color: var(--accent); color: var(--accent); }
  .btn-sim.primary:hover { background: rgba(0,212,170,0.1); }

  .success-page { text-align: center; }
  .success-icon-wrap { width: 90px; height: 90px; margin: 0 auto 24px; position: relative; }
  .success-ring {
    width: 90px; height: 90px; border: 2px solid var(--success); border-radius: 50%; position: absolute;
    animation: ringExpand 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  @keyframes ringExpand { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .success-check {
    width: 90px; height: 90px; background: rgba(16,185,129,0.1); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 36px;
    animation: checkPop 0.4s 0.3s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes checkPop { from { transform: scale(0) rotate(-20deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
  .success-title { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
  .success-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
  .receipt {
    background: rgba(255,255,255,0.02); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 24px; text-align: left;
  }
  .receipt-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .receipt-row:last-child { border-bottom: none; }
  .receipt-row .label { color: var(--muted); }
  .receipt-row .val { font-weight: 500; }
  .receipt-row .val.green { color: var(--success); }
  .redirect-countdown { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .redirect-countdown span { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-weight: 600; }
  .btn-goto {
    width: 100%; background: linear-gradient(135deg, var(--success), #059669);
    color: #fff; font-weight: 700; font-size: 15px; font-family: inherit;
    border: none; border-radius: 12px; padding: 15px; cursor: pointer;
  }

  .tech-panel {
    position: fixed; bottom: 20px; right: 20px; width: 300px;
    background: rgba(10,14,26,0.95); border: 1px solid rgba(0,212,170,0.2);
    border-radius: 12px; padding: 14px 16px; font-size: 11px; z-index: 100; backdrop-filter: blur(10px);
  }
  .tech-panel h4 { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
  .tech-log { font-family: 'JetBrains Mono', monospace; color: var(--muted); line-height: 1.7; max-height: 130px; overflow-y: auto; }
  .tech-log .log-entry { display: block; }
  .tech-log .log-entry.success { color: var(--success); }
  .tech-log .log-entry.warn { color: var(--warning); }
  .tech-log .log-entry.info { color: #60a5fa; }

  @media (max-width: 600px) { .tech-panel { display: none; } }
</style>
</head>
<body>

<!-- PAGE 1: ORDER -->
<div class="page active" id="page-order">
  <div class="card">
    <div class="logo-row">
      <div class="logo-icon">🚀</div>
      <div class="logo-text">FastVPN</div>
      <div class="logo-tag">DEMO</div>
    </div>
    <h2>选择套餐</h2>
    <p class="subtitle">按需选择，随时退款 · 支持全平台</p>
    <div class="plans">
      <div class="plan" onclick="selectPlan(this,'月付',28)">
        <div class="plan-name">月付</div>
        <div class="plan-price">28</div>
        <div class="plan-unit">元/月</div>
      </div>
      <div class="plan selected" onclick="selectPlan(this,'季付',68)">
        <div class="badge">最受欢迎</div>
        <div class="plan-name">季付</div>
        <div class="plan-price">68</div>
        <div class="plan-unit">元/季</div>
      </div>
      <div class="plan" onclick="selectPlan(this,'年付',198)">
        <div class="plan-name">年付</div>
        <div class="plan-price">198</div>
        <div class="plan-unit">元/年</div>
      </div>
    </div>
    <div class="section-label">支付方式</div>
    <div class="pay-methods">
      <button class="pay-btn selected" onclick="selectPay(this)"><span class="icon">💚</span> 微信支付</button>
      <button class="pay-btn" onclick="selectPay(this)"><span class="icon">💙</span> 支付宝</button>
    </div>
    <div class="order-summary">
      <div>
        <div style="font-size:14px;font-weight:600" id="order-plan-name">季付套餐</div>
        <div class="order-info" id="order-desc">有效期 90 天</div>
      </div>
      <div>
        <div class="order-amount"><span>¥</span><span id="price-display">68</span></div>
      </div>
    </div>
    <button class="btn-pay" onclick="gotoQR()">立即支付</button>
  </div>
</div>

<!-- PAGE 2: QR -->
<div class="page" id="page-qr">
  <div class="card">
    <div class="logo-row">
      <div class="logo-icon">🚀</div>
      <div class="logo-text">FastVPN</div>
      <div class="logo-tag">DEMO</div>
    </div>
    <div class="qr-header">
      <h2>微信扫码支付</h2>
      <p class="subtitle">请在二维码有效期内完成支付 <strong id="qr-amount" style="color:var(--accent)">¥68</strong></p>
    </div>
    <div class="qr-wrap">
      <div class="qr-code">
        <div class="qr-inner"></div>
        <div class="scan-line"></div>
      </div>
      <div class="pay-logo">💚 微信支付 &nbsp;·&nbsp; 安全加密</div>
    </div>
    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <div class="status-text" id="status-text">等待扫码...</div>
      <div class="status-timer" id="qr-timer">14:59</div>
    </div>
    <div class="poll-info" id="poll-info">轮询检测支付状态中...</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="demo-controls">
      <button class="btn-sim" onclick="gotoOrder()">← 返回</button>
      <button class="btn-sim primary" onclick="simulatePay()">🎯 模拟支付成功</button>
    </div>
  </div>
</div>

<!-- PAGE 3: SUCCESS -->
<div class="page success-page" id="page-success">
  <div class="card">
    <div class="success-icon-wrap">
      <div class="success-ring"></div>
      <div class="success-check">✓</div>
    </div>
    <div class="success-title">支付成功！</div>
    <div class="success-sub">套餐已自动开通，可立即使用</div>
    <div class="receipt">
      <div class="receipt-row"><span class="label">订单号</span><span class="val" id="order-id">—</span></div>
      <div class="receipt-row"><span class="label">套餐</span><span class="val" id="receipt-plan">—</span></div>
      <div class="receipt-row"><span class="label">支付金额</span><span class="val green" id="receipt-amount">—</span></div>
      <div class="receipt-row"><span class="label">支付时间</span><span class="val" id="receipt-time">—</span></div>
      <div class="receipt-row"><span class="label">账户状态</span><span class="val green">已激活</span></div>
    </div>
    <div class="redirect-countdown"><span id="redirect-count">5</span> 秒后自动跳转到控制台...</div>
    <button class="btn-goto" onclick="gotoOrder()">立即进入控制台</button>
  </div>
</div>

<!-- Tech log -->
<div class="tech-panel">
  <h4>技术日志</h4>
  <div class="tech-log" id="tech-log">
    <span class="log-entry info">[ready] 页面初始化完成</span>
  </div>
</div>

<script>
  let selectedPlan = { name: '季付', price: 68 };
  let pollTimer = null, qrCountdownTimer = null;
  let qrSeconds = 899, pollCount = 0, pollMax = 30;
  let payDone = false;
  const orderId = 'FV' + Date.now().toString().slice(-10);

  function log(msg, type = '') {
    const el = document.getElementById('tech-log');
    const span = document.createElement('span');
    span.className = 'log-entry' + (type ? ' ' + type : '');
    const now = new Date();
    const ts = [now.getHours(), now.getMinutes(), now.getSeconds()].map(n => n.toString().padStart(2,'0')).join(':');
    span.textContent = `[${ts}] ${msg}`;
    el.appendChild(span);
    el.scrollTop = el.scrollHeight;
  }

  function selectPlan(el, name, price) {
    document.querySelectorAll('.plan').forEach(p => p.classList.remove('selected'));
    el.classList.add('selected');
    selectedPlan = { name, price };
    document.getElementById('price-display').textContent = price;
    document.getElementById('order-plan-name').textContent = name + '套餐';
    const dur = { '月付': '有效期 30 天', '季付': '有效期 90 天', '年付': '有效期 365 天' };
    document.getElementById('order-desc').textContent = dur[name];
    log(`选择套餐: ${name} ¥${price}`);
  }

  function selectPay(el) {
    document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    log(`切换支付方式: ${el.textContent.trim()}`);
  }

  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function gotoOrder() {
    stopPolling(); stopQRCountdown(); payDone = false;
    showPage('page-order'); log('返回订单页');
  }

  function gotoQR() {
    document.getElementById('qr-amount').textContent = '¥' + selectedPlan.price;
    qrSeconds = 899; pollCount = 0; payDone = false;
    updateQRTimer();
    document.getElementById('status-dot').style.background = 'var(--warning)';
    document.getElementById('status-text').textContent = '等待扫码...';
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('poll-info').textContent = '轮询检测支付状态中...';
    showPage('page-qr');
    log(`创建订单 ${orderId}，金额 ¥${selectedPlan.price}`, 'info');
    log('生成支付二维码（微信 native_pay API）', 'info');
    startPolling(); startQRCountdown();
  }

  function startQRCountdown() {
    stopQRCountdown();
    qrCountdownTimer = setInterval(() => {
      qrSeconds--;
      updateQRTimer();
      if (qrSeconds <= 0) {
        stopQRCountdown(); stopPolling();
        document.getElementById('status-text').textContent = '二维码已过期，请刷新';
        document.getElementById('status-dot').style.background = 'var(--error)';
        log('二维码超时失效', 'warn');
      }
    }, 1000);
  }

  function stopQRCountdown() { if (qrCountdownTimer) { clearInterval(qrCountdownTimer); qrCountdownTimer = null; } }

  function updateQRTimer() {
    const m = Math.floor(qrSeconds / 60).toString().padStart(2, '0');
    const s = (qrSeconds % 60).toString().padStart(2, '0');
    document.getElementById('qr-timer').textContent = `${m}:${s}`;
  }

  // ===== 核心：前端轮询 =====
  // 真实场景：每 3 秒 GET /api/order/status?id=xxx
  // 后端查询支付回调记录，返回 { status: 'pending'|'paid'|'failed' }
  function startPolling() {
    stopPolling(); pollCount = 0; doPoll();
  }

  function stopPolling() { if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; } }

  function doPoll() {
    if (payDone) return;
    pollCount++;
    const pct = Math.min((pollCount / pollMax) * 100, 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('poll-info').textContent =
      `第 ${pollCount}/${pollMax} 次轮询 — GET /api/order/status?id=${orderId}`;
    log(`轮询 #${pollCount}: 查询订单状态...`);

    // 模拟网络请求 400ms 延迟
    pollTimer = setTimeout(() => {
      const resp = { status: 'pending' }; // 模拟后端响应
      log(`响应: { status: "${resp.status}" }`);

      if (resp.status === 'paid') {
        onPaymentSuccess();
      } else if (pollCount >= pollMax) {
        log('超出最大轮询次数，停止', 'warn');
        stopPolling();
      } else {
        pollTimer = setTimeout(doPoll, 3000); // 3 秒后再次轮询
      }
    }, 400);
  }

  function simulatePay() {
    if (payDone) return;
    payDone = true;
    log('用户完成扫码 → 支付平台异步回调后端 → 更新订单状态', 'success');
    log('下次轮询将收到 status: "paid"', 'info');
    stopPolling();
    document.getElementById('status-dot').style.background = 'var(--success)';
    document.getElementById('status-text').textContent = '检测到支付，正在跳转...';
    setTimeout(() => { log('轮询收到 paid → 触发页面跳转', 'success'); onPaymentSuccess(); }, 800);
  }

  function onPaymentSuccess() {
    stopPolling(); stopQRCountdown();
    const now = new Date();
    document.getElementById('order-id').textContent = orderId;
    document.getElementById('receipt-plan').textContent = selectedPlan.name + '套餐';
    document.getElementById('receipt-amount').textContent = '¥' + selectedPlan.price;
    document.getElementById('receipt-time').textContent =
      `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')} ` +
      `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
    showPage('page-success');
    log('支付成功，跳转成功页', 'success');
    startRedirectCountdown();
  }

  function startRedirectCountdown() {
    let count = 5;
    document.getElementById('redirect-count').textContent = count;
    const t = setInterval(() => {
      count--;
      document.getElementById('redirect-count').textContent = count;
      log(`${count} 秒后跳转 /dashboard...`);
      if (count <= 0) {
        clearInterval(t);
        log('执行 window.location.href = "/dashboard?order=' + orderId + '"', 'info');
        // 真实场景直接跳转，demo 中回到首页演示
        setTimeout(() => gotoOrder(), 500);
      }
    }, 1000);
  }
</script>
</body>
</html>
