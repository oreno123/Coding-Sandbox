services:
  backend:
    image: hanshugithub/ai-media2doc-backend:latest
    env_file:
      - "variables.env"
    deploy:
      mode: replicated
      replicas: 1
    ports:
      - "8080:8080"

  frontend:
    image: hanshugithub/ai-media2doc-frontend:latest
    deploy:
      mode: replicated
      replicas: 1
    environment:
        - VITE_API_BASE_URL=http://localhost:8080
    ports:
      - "5173:5173"
