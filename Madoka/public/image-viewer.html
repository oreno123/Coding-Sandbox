<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片查看 - Madoka</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      font-family: system-ui, -apple-system, sans-serif;
    }
    
    .image-container {
      position: relative;
      max-width: 100vw;
      max-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .image-container img {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      border-radius: 8px;
    }
    
    .close-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: white;
      font-size: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 1000;
      backdrop-filter: blur(8px);
    }
    
    .close-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    
    .close-btn:active {
      background: rgba(255, 255, 255, 0.4);
    }
    
    .hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      backdrop-filter: blur(8px);
      z-index: 1000;
    }
  </style>
</head>
<body>
  <button class="close-btn" onclick="closeWindow()" title="关闭 (Esc)">&times;</button>
  
  <div class="image-container">
    <img id="preview-image" src="" alt="Preview">
  </div>
  
  <div class="hint">按 Esc 或点击 × 关闭</div>
  
  <script>
    // 从 URL 参数获取图片地址
    const urlParams = new URLSearchParams(window.location.search);
    const imageUrl = urlParams.get('image');
    
    if (imageUrl) {
      document.getElementById('preview-image').src = imageUrl;
    } else {
      document.body.innerHTML = '<div style="color: white; font-size: 24px;">图片加载失败</div>';
    }
    
    // 关闭窗口的函数
    function closeWindow() {
      window.close();
    }
    
    // 监听 Esc 键
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeWindow();
      }
    });
    
    // 点击图片也可以关闭
    document.getElementById('preview-image').addEventListener('click', closeWindow);
  </script>
</body>
</html>
